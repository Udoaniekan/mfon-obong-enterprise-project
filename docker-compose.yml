# Docker Compose version
version: '3.8'

# Services = containers that will run
services:

  # ===========================================
  # SERVICE 1: Your NestJS Application
  # ===========================================
  app:
    # Build using our Dockerfile
    build:
      context: .
      dockerfile: Dockerfile

    # Container name (optional, makes it easier to identify)
    container_name: mfon-obong-app

    # Port mapping: HOST:CONTAINER
    # Access the app at localhost:3000
    ports:
      - "3000:3000"

    # Environment variables for the app
    # Values with ${...} are read from your .env file at runtime
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/mfon_obong?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}

    # Wait for PostgreSQL to pass its health check before starting the app.
    # "depends_on" alone only waits for the container to START, not be READY.
    # The health check ensures Postgres is actually accepting connections first.
    depends_on:
      postgres:
        condition: service_healthy

    # Restart policy — restart the container if it crashes
    restart: unless-stopped

    # Connect to our custom network
    networks:
      - mfon-obong-network

  # ===========================================
  # SERVICE 2: PostgreSQL Database
  # ===========================================
  postgres:
    # Use official PostgreSQL Alpine image (smaller size)
    image: postgres:16-alpine

    # Container name
    container_name: mfon-obong-postgres

    # PostgreSQL configuration
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=mfon_obong

    # Port mapping (useful for connecting with a DB client like TablePlus during development)
    ports:
      - "5432:5432"

    # Persist data even if the container is deleted
    volumes:
      - postgres-data:/var/lib/postgresql/data

    # Restart policy
    restart: unless-stopped

    # Health check — Docker will test this command every 10 seconds.
    # pg_isready returns success only when PostgreSQL is ready to accept connections.
    # The app container waits for this before starting.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    # Connect to our custom network
    networks:
      - mfon-obong-network

# ===========================================
# NETWORKS: Allow containers to communicate
# ===========================================
networks:
  mfon-obong-network:
    driver: bridge

# ===========================================
# VOLUMES: Persist data outside containers
# ===========================================
volumes:
  postgres-data:
