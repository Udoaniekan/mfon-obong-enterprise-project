name: Staging Pipeline

on:
  push:
    branches:
      - staging

permissions:
  contents: write
  pull-requests: write

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/mfon-obong-backend

jobs:
  # ─── Step 1: Always runs on every push to staging ───────────────────────────
  # Creates a release PR if there are new conventional commits.
  # When the release PR is merged, it outputs release_created=true
  # which unlocks the build and deploy jobs below.
  release-please:
    name: Create Release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          target-branch: staging

  # ─── Step 2: Only runs when the release PR has been merged ──────────────────
  # Builds the Docker image and pushes it to Docker Hub
  build-and-push:
    name: Build and Push Docker Image
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:staging
            ${{ env.DOCKER_IMAGE }}:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Step 3: Only runs after Docker image is built ──────────────────────────
  # Deploys the new image to CapRover staging environment
  deploy:
    name: Deploy to CapRover Staging
    needs: [release-please, build-and-push]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Deploy image to CapRover
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.CAPROVER_URL }}/api/v2/login" \
            -H "Content-Type: application/json" \
            -d "{\"password\":\"${{ secrets.CAPROVER_PASSWORD }}\"}")

          TOKEN=$(echo $RESPONSE | jq -r '.data.token')

          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "CapRover login failed"
            echo "Response: $RESPONSE"
            exit 1
          fi

          DEPLOY_RESPONSE=$(curl -s -X POST "${{ secrets.CAPROVER_URL }}/api/v2/user/apps/appData" \
            -H "x-captain-auth: $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"appName\":\"${{ secrets.CAPROVER_STAGING_APP_NAME }}\",\"captainDefinitionContent\":\"{\\\"schemaVersion\\\":2,\\\"imageName\\\":\\\"${{ env.DOCKER_IMAGE }}:staging\\\"}\"}")

          echo "Deploy response: $DEPLOY_RESPONSE"
          echo "Staging deployment triggered successfully"
