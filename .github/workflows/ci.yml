name: CI

on:
  push:
    branches-ignore:
      - staging
      - production
  pull_request:
    branches:
      - main
      - staging
      - production

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm run test --if-present

      - name: Build application
        run: npm run build

      - name: Verify build output
        run: |
          if [ -d "dist" ]; then
            echo "Build successful — dist/ folder created"
            ls -la dist/
          else
            echo "Build failed — dist/ folder not found"
            exit 1
          fi
